version: 2
updates:
  # ── Root npm workspace (devDeps + headroom-ai runtime dep) ──────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore" # production deps  -> chore(deps): ...
      prefix-development: "chore" # dev deps         -> chore(deps-dev): ...
      include: "scope"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      production-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"

  # ── GitHub Actions (keep @v4-style tag pins current) ────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci" # -> ci(actions): ...
      include: "scope"
    groups:
      github-actions:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "github-actions"
